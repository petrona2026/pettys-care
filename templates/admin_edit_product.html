{% extends "admin_base.html" %}
{% block title %}Edit Product{% endblock %}

{% block content %}

<div class="admin-header">
    <h1>Edit Product</h1>
    <p>Update this product information.</p>
</div>

<div class="admin-form-card">
    <form method="POST">

        <label>Product Name</label>
        <input type="text" name="name" value="{{ product.name }}" required>

        <label>Slug</label>
        <input type="text" name="slug" value="{{ product.slug }}" required>

        <label>Description</label>
        <textarea name="description" rows="5">{{ product.description }}</textarea>

        <div class="form-row">
            <div>
                <label>Price</label>
                <input type="number" step="0.01" name="price" value="{{ product.price }}" required>
            </div>

            <div>
                <label>Stock</label>
                <input type="number" name="stock" value="{{ product.stock }}">
            </div>
        </div>

        <label>Image Filename</label>
        <input type="text" name="image" value="{{ product.image }}">

        <label>Status</label>
        <select name="status">
            <option value="Active" {% if product.status == "Active" %}selected{% endif %}>Active</option>
            <option value="Inactive" {% if product.status == "Inactive" %}selected{% endif %}>Inactive</option>
        </select>

        <button type="submit">Update Product</button>
        <a href="/admin/products" class="cancel-link">Cancel</a>

    </form>
</div>

{% endblock %}
