{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}

<section style="max-width:420px;margin:80px auto;background:white;padding:35px;border-radius:16px;box-shadow:0 8px 25px rgba(0,0,0,.08);">
    <h1 style="text-align:center;">Admin Login</h1>

    {% if error %}
        <p style="color:red;text-align:center;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required
               style="width:100%;padding:14px;margin:10px 0;">

        <input type="password" name="password" placeholder="Password" required
               style="width:100%;padding:14px;margin:10px 0;">

        <button type="submit" class="hero-final-btn" style="width:100%;border:none;margin-top:15px;">
            Login
        </button>
    </form>
</section>

{% endblock %}
