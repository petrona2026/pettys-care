{% extends "base.html" %}

{% block title %}{{ t.payment_successful }}{% endblock %}

{% block content %}

<section style="max-width:700px;margin:80px auto;text-align:center;">
    <h1>{{ t.payment_successful }}</h1>

    {% if order_number %}
        <h2>{{ t.order }} {{ order_number }}</h2>
    {% endif %}

    <p>{{ t.thank_you_for_your_order }}</p>

    <a href="/shop" class="hero-final-btn">{{ t.continue_shopping }}</a>
</section>

{% endblock %}
