{% extends "admin_base.html" %}
{% block title %}Add Product{% endblock %}

{% block content %}

<div class="admin-header">
    <h1>Add Product</h1>
    <p>Create a new product for PETTY'S CARE.</p>
</div>

<div class="admin-form-card">
    <form method="POST" enctype="multipart/form-data">

        <label>Product Name</label>
        <input type="text" name="name" required placeholder="Coconut Bliss">

        <label>Slug</label>
        <input type="text" name="slug" required placeholder="coconut-bliss">

        <label>Description</label>
        <textarea name="description" rows="5" placeholder="Write product description..."></textarea>

        <div class="form-row">
            <div>
                <label>Price</label>
                <input type="number" step="0.01" name="price" required placeholder="12.00">
            </div>

            <div>
                <label>Stock</label>
                <input type="number" name="stock" value="0">
            </div>
        </div>

                <label>Product Image</label>
                <input type="file" name="image" accept="image/*">
        

        <button type="submit">Save Product</button>
        <a href="/admin/products" class="cancel-link">Cancel</a>

    </form>
</div>

{% endblock %}
